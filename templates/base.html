<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}生成AIパスポート試験対策{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #6f42c1; --accent-light: #e8dff5; }
        body { background: #f4f2f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .navbar { background: linear-gradient(135deg, #6f42c1, #4a2d8a) !important; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .card-header { border-radius: 1rem 1rem 0 0 !important; }
        .choice-btn {
            margin: 6px 0; text-align: left; border-radius: .75rem;
            padding: 12px 16px; font-size: .95rem; white-space: normal;
            word-break: break-word;
        }
        .explanation { background: #f0ecf5; padding: 14px; border-radius: .75rem; margin-top: 12px; }
        .chapter-card { transition: transform .15s; cursor: pointer; }
        .chapter-card:hover { transform: translateY(-3px); }
        .badge-chapter { background: var(--accent); }
        .progress { height: 8px; border-radius: 4px; }
        @media (max-width: 576px) {
            .container { padding-left: 10px; padding-right: 10px; }
            .card-body { padding: 1rem; }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-3">
        <a class="navbar-brand fw-bold" href="/">🤖 生成AIパスポート</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/">ホーム</a>
            <a class="btn btn-outline-light btn-sm" href="/scores">成績</a>
        </div>
    </nav>
    <div class="container mt-3 mb-5">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function saveScore(mode, score, correct, total) {
            const scores = JSON.parse(localStorage.getItem('genaiScores') || '[]');
            scores.push({ date: new Date().toLocaleString('ja-JP'), mode, score, correct, total });
            localStorage.setItem('genaiScores', JSON.stringify(scores));
        }
        function loadScores() { return JSON.parse(localStorage.getItem('genaiScores') || '[]'); }
        function clearScores() { localStorage.removeItem('genaiScores'); }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
