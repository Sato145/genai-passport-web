{% extends "base.html" %}
{% block title %}成績確認 - 生成AIパスポート試験対策{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header text-white d-flex justify-content-between align-items-center py-2"
                 style="background:linear-gradient(135deg,#6f42c1,#4a2d8a)">
                <strong>📊 成績履歴</strong>
                <button class="btn btn-outline-light btn-sm" onclick="clearAll()">クリア</button>
            </div>
            <div class="card-body" id="content"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function render() {
    const scores = loadScores();
    const el = document.getElementById('content');

    if (!scores.length) {
        el.innerHTML = `
            <div class="text-center py-4">
                <p class="lead">まだ成績データがありません</p>
                <a href="/exam" class="btn text-white" style="background:var(--accent)">問題に挑戦する</a>
            </div>`;
        return;
    }

    // 統計
    const avg = scores.reduce((s,r) => s + r.score, 0) / scores.length;
    const best = Math.max(...scores.map(r => r.score));

    let html = `
        <div class="row g-2 mb-3">
            <div class="col-4 text-center">
                <div class="card" style="background:var(--accent-light)">
                    <div class="card-body py-2">
                        <div class="small text-muted">受験回数</div>
                        <div class="fw-bold fs-5">${scores.length}</div>
                    </div>
                </div>
            </div>
            <div class="col-4 text-center">
                <div class="card" style="background:var(--accent-light)">
                    <div class="card-body py-2">
                        <div class="small text-muted">平均</div>
                        <div class="fw-bold fs-5">${avg.toFixed(0)}%</div>
                    </div>
                </div>
            </div>
            <div class="col-4 text-center">
                <div class="card" style="background:var(--accent-light)">
                    <div class="card-body py-2">
                        <div class="small text-muted">最高</div>
                        <div class="fw-bold fs-5">${best.toFixed(0)}%</div>
                    </div>
                </div>
            </div>
        </div>`;

    // 履歴テーブル（最新20件）
    const recent = scores.slice(-20).reverse();
    html += `<div class="table-responsive"><table class="table table-sm">
        <thead><tr><th>日時</th><th>モード</th><th>結果</th><th></th></tr></thead><tbody>`;

    recent.forEach(r => {
        const badge = r.score >= 80 ? 'success' : r.score >= 60 ? 'primary' : r.score >= 40 ? 'warning' : 'danger';
        const label = r.score >= 80 ? '優秀' : r.score >= 60 ? '良好' : r.score >= 40 ? '普通' : '要復習';
        html += `<tr>
            <td class="small">${r.date}</td>
            <td class="small">${r.mode}</td>
            <td>${r.correct}/${r.total} (${r.score.toFixed(0)}%)</td>
            <td><span class="badge bg-${badge}">${label}</span></td>
        </tr>`;
    });

    html += `</tbody></table></div>
        <div class="d-grid gap-2 mt-3">
            <a href="/exam" class="btn text-white" style="background:var(--accent)">もう一度挑戦</a>
            <a href="/" class="btn btn-outline-secondary">ホームに戻る</a>
        </div>`;

    el.innerHTML = html;
}

function clearAll() {
    if (confirm('すべての成績データを削除しますか？')) { clearScores(); render(); }
}

document.addEventListener('DOMContentLoaded', render);
</script>
{% endblock %}
